<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenAPM Landscape</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      margin-right: 6px;
    }

    .filter-btn {
      padding: 4px 10px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.15s, border-color 0.15s;
      background: var(--color);
      color: #fff;
      opacity: 0.45;
    }
    .filter-btn.active { opacity: 1; border-color: #fff4; }

    #toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #search {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e0e0e0;
      font-size: 13px;
      width: 180px;
      transition: border-color 0.15s;
    }
    #search:focus {
      outline: none;
      border-color: #4c8bf5;
    }

    .toolbar-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .toolbar-btn:hover { background: #1a1d27; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #cy {
      flex: 1;
      height: 100%;
    }

    /* Panel slides in from the right.
       margin-right: -290px collapses its flex footprint when hidden so #cy fills the full width. */
    #panel {
      width: 290px;
      background: #1a1d27;
      border-left: 1px solid #2a2d3a;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      flex-shrink: 0;
      transform: translateX(100%);
      margin-right: -290px;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                  margin-right 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.18s ease;
    }
    #panel.visible {
      transform: translateX(0);
      margin-right: 0;
      opacity: 1;
      pointer-events: auto;
    }

    #panel-inner {
      width: 290px;
      padding: 20px 16px;
    }

    #panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    #panel .category-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: #fff;
      margin: 4px 2px 10px;
    }

    #panel p {
      font-size: 12px;
      line-height: 1.6;
      color: #aaa;
      margin-bottom: 12px;
    }

    #panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 16px 0 6px;
    }

    #panel .conn-list {
      list-style: none;
      font-size: 12px;
    }
    #panel .conn-list li {
      padding: 4px 6px;
      color: #aaa;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }
    #panel .conn-list li:hover {
      background: #2a2d3a;
      color: #fff;
    }

    #panel .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.1s;
    }
    #panel .close-btn:hover { color: #fff; }

    #panel-logo-wrap {
      margin-bottom: 10px;
    }

    #logo-img {
      max-height: 48px;
      max-width: 110px;
      object-fit: contain;
      border-radius: 6px;
      background: #fff;
      padding: 4px;
      display: block;
    }

    #panel-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 12px;
      background: #2a2d3a;
      border: 1px solid #3a3d4a;
      border-radius: 6px;
      color: #7eb8f7;
      font-size: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    #panel-link-btn:hover { background: #3a3d4a; }

    #panel-github-links {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 6px;
    }

    .gh-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
      color: #9a9ea8;
      text-decoration: none;
      transition: color 0.1s;
    }
    .gh-link:hover { color: #e0e0e0; }

    #node-tooltip {
      position: fixed;
      background: #1a1d27;
      border: 1px solid #3a3d4a;
      color: #e0e0e0;
      font-size: 12px;
      padding: 4px 9px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #node-tooltip.show { opacity: 1; }

    #status {
      position: absolute;
      bottom: 12px;
      left: 16px;
      font-size: 11px;
      color: #555;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>OpenAPM Landscape</h1>
  <div id="filter-buttons"></div>
  <div id="toolbar-right">
    <input id="search" type="text" placeholder="Search… (/)">
    <button class="toolbar-btn" id="fit-btn">Fit</button>
    <button class="toolbar-btn" id="layout-btn">Re-layout</button>
  </div>
</div>

<div id="main">
  <div id="cy"></div>
  <div id="panel">
    <div id="panel-inner">
      <button class="close-btn" id="close-panel">✕</button>
      <div id="panel-logo-wrap">
        <img id="logo-img" src="" alt="">
      </div>
      <h2 id="panel-name"></h2>
      <div id="panel-categories"></div>
      <p id="panel-desc"></p>
      <a id="panel-link-btn" href="#" target="_blank" rel="noopener" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Visit website
      </a>
      <div id="panel-github-links"></div>
      <div id="panel-connections"></div>
    </div>
  </div>
</div>

<div id="node-tooltip"></div>
<div id="status">Loading…</div>

<script>
const CATEGORY_COLORS = {
  'agent':               '#4c8bf5',
  'instrumentation-lib': '#9c6efc',
  'collector':           '#f5a623',
  'transport':           '#50c8a8',
  'format':              '#a8d8a8',
  'data-processing':     '#f07070',
  'storage':             '#e8a87c',
  'visualization':       '#5fc8f0',
  'dashboarding':        '#85d4f5',
  'alerting':            '#f76d6d',
  'commercial-services': '#b0b0b0',
};

const DEFAULT_COLOR = '#888';

function categoryColor(cats) {
  if (!cats || cats.length === 0) return DEFAULT_COLOR;
  return CATEGORY_COLORS[cats[0]] || DEFAULT_COLOR;
}

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

let cy;
let activeCategories = new Set(Object.keys(CATEGORY_COLORS));
let compMap = {};

async function resolveLogos(components) {
  const cache = {};
  const ids = [...new Set(components.filter(c => c.logo).map(c => c.logo))];
  await Promise.all(ids.map(async id => {
    for (const ext of ['png', 'jpg', 'jpeg', 'svg']) {
      const url = `logos/${id}.${ext}`;
      const ok = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
      if (ok) { cache[id] = url; break; }
    }
  }));
  return cache;
}

fetch('build/model.json')
  .then(r => r.json())
  .then(async data => {
    document.getElementById('status').textContent = 'Resolving logos…';
    await initViz(data);
  })
  .catch(err => {
    document.getElementById('status').textContent = 'Error loading model.json: ' + err.message;
  });

async function initViz(data) {
  const components = data.components;
  const logoCache = await resolveLogos(components);

  components.forEach(c => { compMap[c.id] = c; });

  const nodes = components.map(c => ({
    data: {
      id: c.id,
      label: c.name,
      categories: c.categories || [],
      color: categoryColor(c.categories),
      component: c,
      logoUrl: logoCache[c.logo] || null,
    }
  }));

  const idSet = new Set(components.map(c => c.id));
  const edges = [];
  const seen = new Set();

  components.forEach(c => {
    const conns = c.connections || {};
    (conns.dataTo || []).forEach(target => {
      if (!idSet.has(target)) return;
      const key = c.id + '|' + target;
      if (!seen.has(key)) { seen.add(key); edges.push({ data: { id: key, source: c.id, target } }); }
    });
    (conns.dataFrom || []).forEach(source => {
      if (!idSet.has(source)) return;
      const key = source + '|' + c.id;
      if (!seen.has(key)) { seen.add(key); edges.push({ data: { id: key, source, target: c.id } }); }
    });
  });

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: { nodes, edges },
    style: [
      {
        selector: 'node',
        style: {
          'background-color': 'data(color)',
          'label': 'data(label)',
          'color': '#fff',
          'font-size': '9px',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': '3px',
          'width': 26,
          'height': 26,
          'border-width': 0,
          'text-outline-width': 1,
          'text-outline-color': '#0f1117',
        }
      },
      {
        selector: 'node[?logoUrl]',
        style: {
          'background-image': 'data(logoUrl)',
          'background-fit': 'contain',
          'background-clip': 'none',
          'background-color': '#ffffff',
          'background-image-opacity': 1,
          'background-width': '80%',
          'background-height': '80%',
          'border-width': 2.5,
          'border-color': 'data(color)',
          'width': 52,
          'height': 52,
        }
      },
      {
        selector: 'node[?logoUrl]:selected',
        style: { 'border-width': 3.5, 'border-color': '#fff', 'width': 58, 'height': 58 }
      },
      {
        selector: 'node:selected',
        style: { 'border-width': 2, 'border-color': '#fff', 'width': 32, 'height': 32 }
      },
      {
        selector: 'node.highlighted',
        style: { 'border-width': 2.5, 'border-color': '#ffdd57', 'opacity': 1 }
      },
      {
        selector: 'node[?logoUrl].highlighted',
        style: { 'border-color': '#ffdd57', 'border-width': 3.5 }
      },
      {
        selector: 'node.faded',
        style: { 'opacity': 0.12 }
      },
      {
        selector: 'edge',
        style: {
          'width': 1,
          'line-color': '#2a2d3a',
          'target-arrow-color': '#3a3d4a',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'opacity': 0.6,
        }
      },
      {
        selector: 'edge.highlighted',
        style: { 'line-color': '#ffdd5788', 'target-arrow-color': '#ffdd5788', 'width': 2, 'opacity': 1 }
      },
      {
        selector: 'edge.faded',
        style: { 'opacity': 0.04 }
      },
      {
        selector: 'node.hidden, edge.hidden',
        style: { 'display': 'none' }
      }
    ],
    layout: { name: 'cose', animate: true, nodeRepulsion: 8000, idealEdgeLength: 80 }
  });

  buildFilterButtons(data.categories || []);
  bindEvents();
  updateStatus();
}

function updateStatus() {
  const total = cy.nodes().length;
  const visible = cy.nodes().not('.hidden').length;
  const edges = cy.edges().not('.hidden').length;
  const countStr = visible < total ? `${visible}/${total}` : `${total}`;
  document.getElementById('status').textContent =
    `${countStr} components · ${edges} connections · double-click node to open website`;
}

function buildFilterButtons(categories) {
  const container = document.getElementById('filter-buttons');

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.style.setProperty('--color', '#444');
  allBtn.style.background = '#444';
  allBtn.addEventListener('click', () => {
    const allActive = activeCategories.size === Object.keys(CATEGORY_COLORS).length;
    if (allActive) {
      activeCategories.clear();
    } else {
      Object.keys(CATEGORY_COLORS).forEach(c => activeCategories.add(c));
    }
    container.querySelectorAll('.filter-btn[data-cat]').forEach(b => {
      b.classList.toggle('active', activeCategories.has(b.dataset.cat));
    });
    applyFilters();
  });
  container.appendChild(allBtn);

  const catIds = categories.length > 0 ? categories.map(c => c.id) : Object.keys(CATEGORY_COLORS);
  catIds.forEach(catId => {
    const color = CATEGORY_COLORS[catId] || DEFAULT_COLOR;
    const catDef = (categories || []).find(c => c.id === catId);
    const label = catDef ? catDef.name : catId;

    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.dataset.cat = catId;
    btn.textContent = label;
    btn.style.setProperty('--color', color);
    btn.style.background = color;

    btn.addEventListener('click', () => {
      if (activeCategories.has(catId)) {
        activeCategories.delete(catId);
        btn.classList.remove('active');
      } else {
        activeCategories.add(catId);
        btn.classList.add('active');
      }
      applyFilters();
    });
    container.appendChild(btn);
  });
}

function applyFilters() {
  const searchTerm = document.getElementById('search').value.toLowerCase().trim();
  cy.batch(() => {
    cy.nodes().forEach(node => {
      const cats = node.data('categories') || [];
      const matchesCat = cats.length === 0 || cats.some(c => activeCategories.has(c));
      const matchesSearch = !searchTerm ||
        node.data('label').toLowerCase().includes(searchTerm) ||
        (node.data('component').description || '').toLowerCase().includes(searchTerm);
      node.toggleClass('hidden', !(matchesCat && matchesSearch));
    });
    cy.edges().forEach(edge => {
      edge.toggleClass('hidden', edge.source().hasClass('hidden') || edge.target().hasClass('hidden'));
    });
  });

  const visible = cy.nodes().not('.hidden');
  if (visible.length > 0 && visible.length < cy.nodes().length) {
    cy.animate({ fit: { eles: visible, padding: 60 } }, { duration: 300 });
  } else if (visible.length === cy.nodes().length) {
    cy.animate({ fit: { padding: 40 } }, { duration: 300 });
  }
  updateStatus();
}

function highlightNode(node) {
  cy.elements().removeClass('highlighted faded');
  const connected = node.neighborhood();
  connected.addClass('highlighted');
  node.addClass('highlighted');
  cy.elements().not(connected).not(node).addClass('faded');
  node.removeClass('faded');
}

function bindEvents() {
  const tooltip = document.getElementById('node-tooltip');

  // Single click → open panel + highlight
  cy.on('tap', 'node', evt => {
    const node = evt.target;
    highlightNode(node);
    showPanel(node.data('component'));
  });

  // Double-click → open website
  cy.on('dblclick', 'node', evt => {
    const comp = evt.target.data('component');
    if (comp && comp.link) window.open(comp.link, '_blank', 'noopener');
  });

  // Background tap → clear highlight and close panel
  cy.on('tap', evt => {
    if (evt.target === cy) {
      cy.elements().removeClass('highlighted faded');
      hidePanel();
    }
  });

  // Hover tooltip
  cy.on('mouseover', 'node', evt => {
    tooltip.textContent = evt.target.data('label');
    tooltip.classList.add('show');
  });
  cy.on('mouseout', 'node', () => tooltip.classList.remove('show'));
  document.getElementById('cy').addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 36) + 'px';
  });

  // Search with debounce
  document.getElementById('search').addEventListener('input', debounce(applyFilters, 150));

  // Close button
  document.getElementById('close-panel').addEventListener('click', () => {
    cy.elements().removeClass('highlighted faded');
    hidePanel();
  });

  // Re-layout, then fit
  document.getElementById('layout-btn').addEventListener('click', () => {
    const layout = cy.layout({ name: 'cose', animate: true, nodeRepulsion: 8000, idealEdgeLength: 80 });
    layout.one('layoutstop', () => cy.animate({ fit: { padding: 40 } }, { duration: 300 }));
    layout.run();
  });

  // Fit button
  document.getElementById('fit-btn').addEventListener('click', () => {
    const visible = cy.nodes().not('.hidden');
    cy.animate({ fit: { eles: visible.length ? visible : cy.nodes(), padding: 50 } }, { duration: 300 });
  });

  // Keyboard shortcuts: Escape closes panel, / focuses search
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      cy.elements().removeClass('highlighted faded');
      hidePanel();
    }
    if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
      e.preventDefault();
      document.getElementById('search').focus();
      document.getElementById('search').select();
    }
  });
}

function showPanel(component) {
  document.getElementById('panel').classList.add('visible');

  const node = cy.getElementById(component.id);
  const resolvedUrl = node && node.data('logoUrl');
  const logoEl = document.getElementById('logo-img');
  if (resolvedUrl) {
    logoEl.src = resolvedUrl;
    logoEl.style.display = 'block';
  } else {
    logoEl.style.display = 'none';
  }

  document.getElementById('panel-name').textContent = component.name;
  document.getElementById('panel-desc').textContent = component.description || '';

  const catsEl = document.getElementById('panel-categories');
  catsEl.innerHTML = '';
  (component.categories || []).forEach(cat => {
    const span = document.createElement('span');
    span.className = 'category-tag';
    span.style.background = CATEGORY_COLORS[cat] || DEFAULT_COLOR;
    span.textContent = cat;
    catsEl.appendChild(span);
  });

  const linkBtn = document.getElementById('panel-link-btn');
  if (component.link) {
    linkBtn.href = component.link;
    linkBtn.style.display = 'inline-flex';
  } else {
    linkBtn.style.display = 'none';
  }

  const ghEl = document.getElementById('panel-github-links');
  ghEl.innerHTML = '';
  (component.github || []).forEach(gh => {
    const a = document.createElement('a');
    a.href = `https://github.com/${gh}`;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'gh-link';
    a.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>${gh}`;
    ghEl.appendChild(a);
  });

  const connsEl = document.getElementById('panel-connections');
  connsEl.innerHTML = '';
  const conns = component.connections || {};

  function makeConnList(ids, prefix, sectionLabel) {
    const valid = ids.filter(id => compMap[id]);
    if (!valid.length) return;
    const h = document.createElement('h3');
    h.textContent = sectionLabel;
    connsEl.appendChild(h);
    const ul = document.createElement('ul');
    ul.className = 'conn-list';
    valid.forEach(id => {
      const comp = compMap[id];
      const li = document.createElement('li');
      li.textContent = prefix + comp.name;
      li.addEventListener('click', () => {
        const targetNode = cy.getElementById(id);
        if (targetNode.length) {
          cy.animate({ center: { eles: targetNode }, zoom: 1.5 }, { duration: 300 });
          highlightNode(targetNode);
          showPanel(comp);
        }
      });
      ul.appendChild(li);
    });
    connsEl.appendChild(ul);
  }

  makeConnList(conns.dataFrom || [], '← ', 'Receives data from');
  makeConnList(conns.dataTo   || [], '→ ', 'Sends data to');
}

function hidePanel() {
  document.getElementById('panel').classList.remove('visible');
}
</script>
</body>
</html>
